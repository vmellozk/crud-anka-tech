version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: investimentos
      MYSQL_USER: user
      MYSQL_PASSWORD: userpass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    command: sh -c "npx prisma migrate dev && tsx src/server.ts"
    volumes:
      - ./backend:/app
    working_dir: /app
    environment:
      - DATABASE_URL=mysql://user:userpass@db:3306/investimentos
    ports:
      - "3001:3001"
    depends_on:
      - db

volumes:
  db_data:
